name: Create Release PR

on:
  pull_request_target:
    types: [closed]

permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write

concurrency:
  group: create-release-pr
  cancel-in-progress: false

jobs:
  create-release-pr:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    outputs:
      skip: ${{ steps.next.outputs.skip }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Determine next release version
        id: next
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(uv run cz version --project)
          CURRENT_TAG="v${CURRENT_VERSION}"

          if ! git tag --list "${CURRENT_TAG}" | grep -q . && git tag --list 'v*' | grep -q .; then
            echo "::notice::Skipping release PR creation because main is still at ${CURRENT_VERSION} while later release tags already exist. Sync the prior release metadata onto main first."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if NEXT_VERSION=$(uv run cz bump --get-next 2>cz.err); then
            echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -q "\[NO_COMMITS_TO_BUMP\]" cz.err; then
            echo "No releasable commits found since the last tag."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -q "No tag matching configuration could be found" cz.err; then
            echo "No reachable release tag was found from main." >&2
            echo "Bootstrap the first release tag once, then the rolling release PR flow takes over." >&2
            cat cz.err >&2
            exit 1
          fi

          cat cz.err >&2
          exit 1

      - name: Prepare release commit contents
        if: steps.next.outputs.skip != 'true'
        env:
          NEXT_VERSION: ${{ steps.next.outputs.next_version }}
        run: |
          uv run cz bump --yes --changelog --files-only "${NEXT_VERSION}"
          uv lock

      - name: Create or update release PR
        if: steps.next.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/next
          delete-branch: false
          commit-message: "chore(release): v${{ steps.next.outputs.next_version }}"
          title: "chore(release): v${{ steps.next.outputs.next_version }}"
          body: |
            Automated release PR for `v${{ steps.next.outputs.next_version }}`.

            This PR was created from the latest merged changes on `main` and contains:
            - version file updates
            - lockfile updates
            - changelog updates

            This is a rolling release PR. Additional merges to `main` will update this PR in place, including recalculating the release version when needed.

            Merge this PR to publish the GitHub release.

  validate-release-pr:
    if: needs.create-release-pr.outputs.skip != 'true'
    needs: create-release-pr
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/next
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Resolve release head SHA
        id: release-head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create pending validation check
        id: pending-check
        run: |
          CHECK_ID=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name='validation' \
            -f head_sha='${{ steps.release-head.outputs.sha }}' \
            -f status='in_progress' \
            -f details_url="${RUN_URL}" \
            --jq '.id')
          echo "id=${CHECK_ID}" >> "$GITHUB_OUTPUT"

      - name: Install dev dependencies
        id: install
        continue-on-error: true
        run: uv sync --dev

      - name: Run pre-commit checks
        id: precommit
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: uv run pre-commit run --all-files

      - name: Run tests
        id: tests
        if: steps.install.outcome == 'success' && steps.precommit.outcome == 'success'
        continue-on-error: true
        run: uv run pytest -v

      - name: Complete validation check
        if: always() && steps.pending-check.outcome == 'success'
        env:
          VALIDATION_CONCLUSION: >-
            ${{ steps.install.outcome == 'success' &&
                steps.precommit.outcome == 'success' &&
                steps.tests.outcome == 'success' &&
                'success' || 'failure' }}
          VALIDATION_SUMMARY: >-
            ${{ steps.install.outcome == 'success' &&
                steps.precommit.outcome == 'success' &&
                steps.tests.outcome == 'success' &&
                'Release PR validation passed.' || 'Release PR validation failed. See the workflow run for details.' }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/check-runs/${{ steps.pending-check.outputs.id }}" \
            -f name='validation' \
            -f status='completed' \
            -f conclusion="${VALIDATION_CONCLUSION}" \
            -f details_url="${RUN_URL}" \
            -f output[title]='Validation' \
            -f output[summary]="${VALIDATION_SUMMARY}" >/dev/null

      - name: Fail job if validation failed
        if: steps.install.outcome != 'success' || steps.precommit.outcome != 'success' || steps.tests.outcome != 'success'
        run: exit 1
