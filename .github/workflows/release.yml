name: Release

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    # Semantic guard: only the merged rolling release PR on release/next may publish.
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'release/next'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6

      - name: Install dev dependencies
        run: uv sync --dev

      - name: Determine release version
        id: version
        run: |
          set -euo pipefail
          echo "release_version=$(uv run cz version --project)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(uv run cz version --project --tag)" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: uv build

      - name: Publish tag and GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
            exit 0
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git tag -a "${RELEASE_TAG}" "${MERGE_COMMIT_SHA}" -m "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

          gh release create "${RELEASE_TAG}" dist/* \
            --title "${RELEASE_TAG}" \
            --generate-notes
